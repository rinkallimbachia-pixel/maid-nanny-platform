<article class="surface-card p-3 md:p-4 transition duration-300 hover:-translate-y-1 hover:shadow-xl">
  <div class="relative">
    <img [src]="helper.image" [alt]="helper.name" class="h-56 w-full object-cover rounded-2xl mb-4" />
    <span class="absolute top-2 right-2 rounded-full bg-[#f5efe3] border border-[#d5c8b1] px-2.5 py-1 text-xs font-semibold text-[#30553a]">Verified</span>
  </div>
  <h3 class="font-semibold text-2xl tracking-tight text-[#243127]">{{ helper.name }}</h3>
  <p class="text-sm text-[#72796f] mt-0.5">{{ helper.role }}</p>
  <div class="flex flex-wrap gap-1.5 mt-3">
    @for (skill of helper.skills; track skill) {
      <span class="text-xs px-2.5 py-1 rounded-full bg-[#eae3d4] text-[#5e665b]">{{ skill }}</span>
    }
  </div>
  <div class="mt-4 flex items-center justify-between text-sm border-t border-[#e4dbc9] pt-3">
    <span class="text-[#8b6c31] font-semibold">Rating {{ helper.rating }}</span>
    <span class="font-semibold text-[#1d3f2b]">{{ helper.price }}</span>
  </div>
  <button mat-flat-button color="primary" class="w-full mt-4" [routerLink]="['/helper', helper.id || '1']">View</button>
</article>
